<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<title>Componentes | DRAH</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #b7edea;
    color: #333;
    min-height: 100vh;
    padding-top: 80px;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: #006d77;
        z-index: 1000;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 15px;
    }  

    .logo img {
        height: 50px;
        width: auto;
        display: block;
    }

    .menu-superior {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .menu-superior a {
        background: #00c2c7;
        color: white;
        border: none;
        padding: 10px 22px;
        border-radius: 20px;
        font-weight: 600;
        text-decoration: none !important;
    }

    .menu-superior a:hover {
        background: #006d77;
    }

  /* CONTAINER */
  .container {
    width: 100%;
    background: #E5FFFA;
    flex: 1;
    padding: 30px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* BARRA PESQUISA */
  .search-bar {
  margin-top: 22px;
  display: flex;
  justify-content: center;
}

.search-bar input {
  width: 100%;
  max-width: 420px;
  padding: 10px 14px;
  border-radius: 30px;
  border: 2px solid #006d77;
  font-size: 16px;
}

  /* GRID COMPONENTES */
  .grid-quadrantes {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 22px;
    width: 95%;
    max-width: 900px;
  }

  /* CARD INDIVIDUAL */
  .component-card {
    background: white;
    border-left: 6px solid #006d77;
    border-radius: 16px;
    padding: 18px;

    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .component-card img {
  width: 100%;
  aspect-ratio: 1/1;        /* força imagem quadrada */
  border-radius: 12px;
  object-fit: cover;
  border: 2px solid #00c2c7;
  margin-bottom: 12px;
}

  .component-title {
    font-size: 18px;
    font-weight: 800;
    color: #003F47;
    margin-top: 12px;
  }

  .component-desc {
    font-size: 14px;
    color: #333;
    margin: 6px 0 10px;
    min-height: 40px;
  }

  .component-qty {
    font-size: 15px;
    font-weight: 700;
    color: #006d77;
  }

  /* BOTÃO ALTERAR */
  .btn {
    width: 100%;
    margin-top: auto;
    background: #b7edea;
    color: #006d77;
    font-size: 15px;
    font-weight: 700;
    padding: 8px;
    border-radius: 20px;
    border: 2px solid #006d77;
    cursor: pointer;
  }

  .btn:hover {
    background: #006d77;
    color: #E5FFFA;
  }

</style>
</head>
