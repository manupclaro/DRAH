<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tipo de Conta | DRAH</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff2e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 420px;
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 10px #751F00;
      text-align: center;
    }

    .logo img {
      height: 80px;
      margin-bottom: 18px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }

    .padrao {
      background: #ff7f50;
      color: white;
    }

    .padrao:hover {
      background: #ED5721;
    }

    .adm {
      background: #006d77;
      color: white;
    }

    .adm:hover {
      background: #003F47;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      <img src="imagens/logo_laranja.png" alt="Devolução e Reserva de Aparelhos de Hardware"/>
    </div>

    <button class="btn padrao" onclick="location.href='cadastro.html'">
      Conta Padrão
    </button>

    <button class="btn adm" onclick="location.href='cadastro_adm.html'">
      Administrador
    </button>
  </div>
</body>
</html>
